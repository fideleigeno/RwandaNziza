<!DOCTYPE html>
<html>
<head>
    <title>Employee Salary Report</title>

    <style>
        body
        {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 40px;
        }

        .container
        {
            width: 80%;
            margin: auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px gray;
        }

        h2
        {
            text-align: center;
            color: darkblue;
        }

        table
        {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th
        {
            background-color: darkblue;
            color: white;
            padding: 12px;
        }

        td
        {
            text-align: center;
            padding: 10px;
        }

        tr:nth-child(even)
        {
            background-color: #f2f2f2;
        }

        tr:hover
        {
            background-color: #d9edf7;
        }

        h3
        {
            text-align: center;
            color: green;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Employee Salary Report</h2>

<table border="1">

<tr>
    <th>Employee Name</th>
    <th>Gross Salary (FRW)</th>
    <th>Tax (%)</th>
    <th>Net Salary (FRW)</th>
</tr>

<script>

var Employee;
var GrossSalary;
var Tax;
var NetSalary;
var NumberOfEmployees;
var i;

function DisplaySalary()
{
    if (GrossSalary <= 0)
    {
        document.write("<tr>");
        document.write("<td>" + Employee + "</td>");
        document.write("<td colspan='3'>Invalid Gross Salary</td>");
        document.write("</tr>");
    }
    else
    {
        if (GrossSalary > 100000)
        {
            Tax = 0.20;
        }
        else
        {
            Tax = 0;
        }

        NetSalary = GrossSalary - (GrossSalary * Tax);

        document.write("<tr>");
        document.write("<td>" + Employee + "</td>");
        document.write("<td>" + GrossSalary + "</td>");
        document.write("<td>" + (Tax * 100) + "%</td>");
        document.write("<td>" + NetSalary + "</td>");
        document.write("</tr>");
    }
}

NumberOfEmployees = Number(prompt("Enter Number of Employees"));

for(i = 1; i <= NumberOfEmployees; i++)
{
    Employee = prompt("Enter Employee " + i + " Name");
    GrossSalary = Number(prompt("Enter Employee " + i + " Gross Salary"));
    DisplaySalary();
}

</script>

</table>

<br>

<h3>End of Employee Salary Report</h3>

</div>

</body>
</html>
