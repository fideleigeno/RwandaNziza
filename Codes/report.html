<div class="page-container">

<div class="glass-card">

<h1>Report Infrastructure Problems</h1>

<p class="page-description">
Help improve Rwanda by reporting damaged roads,
water leaks, electric problems and public infrastructure issues.
</p>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>

<label>Phone Number</label>
<input type="tel" placeholder="+2507..." required>

<label>Email Address</label>
<input type="email" placeholder="example@gmail.com" required>

<label>Problem Type</label>

<select required>

<option value="">Select Problem Type</option>

<option>Damaged Road</option>
<option>Broken Water Pipe</option>
<option>Electric Line Damage</option>
<option>Flooding</option>
<option>Broken Street Light</option>
<option>Bridge Damage</option>
<option>Garbage Problem</option>
<option>Other</option>

</select>

<label>District</label>
<input type="text" placeholder="Enter District" required>

<label>Sector</label>
<input type="text" placeholder="Enter Sector" required>

<label>Cell</label>
<input type="text" placeholder="Enter Cell" required>

<label>Upload Image</label>
<input type="file" required>

<label>Description</label>

<textarea rows="5" placeholder="Describe the problem clearly"></textarea>

<button type="submit">
Submit Report
</button>

</form>

</div>

</div>

</div>

</body>
